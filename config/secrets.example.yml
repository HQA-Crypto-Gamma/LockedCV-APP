---
# Rename file to secrets.yml to get started for development or test

# Redis URL: set ONE of REDISCLOUD_URL or REDIS_URL, depending on which
# add-on you've provisioned. Redis Cloud exposes REDISCLOUD_URL; Heroku Redis
# exposes REDIS_URL. Code reads whichever is non-nil, Redis Cloud first.

development:
  API_URL: http://localhost:9000/api/v1
  APP_URL: http://localhost:9292
  SESSION_SECRET: <use `bundle exec rake generate:session_secret`>
  MSG_KEY: <use `bundle exec rake newkey:msg`>
  SIGNING_KEY: <matching signing key for the API VERIFY_KEY>
  REDISCLOUD_URL: redis://localhost:6379/0
  # REDIS_URL: redis://localhost:6379/0
  GOOGLE_CLIENT_ID: <Google OAuth client id for this application>
  GOOGLE_CLIENT_SECRET: <Google OAuth client secret for this application>
  GOOGLE_AUTH_URL: https://accounts.google.com/o/oauth2/v2/auth
  GOOGLE_TOKEN_URL: https://oauth2.googleapis.com/token
  GOOGLE_JWKS_URL: https://www.googleapis.com/oauth2/v3/certs

test:
  API_URL: http://localhost:9000/api/v1
  APP_URL: http://localhost:9292
  SESSION_SECRET: <use `bundle exec rake generate:session_secret`>
  MSG_KEY: <use `bundle exec rake newkey:msg`>
  SIGNING_KEY: <test signing key used by request-signing specs>
  REDISCLOUD_URL: redis://localhost:6379/0
  # REDIS_URL: redis://localhost:6379/0
  GOOGLE_CLIENT_ID: test-google-client-id
  GOOGLE_CLIENT_SECRET: test-google-client-secret
  GOOGLE_AUTH_URL: https://accounts.google.com/o/oauth2/v2/auth
  GOOGLE_TOKEN_URL: https://oauth2.googleapis.com/token
  GOOGLE_JWKS_URL: https://www.googleapis.com/oauth2/v3/certs

production:
  API_URL: <set to production API root>
  APP_URL: <set to production app URL>
  SESSION_SECRET: <use `bundle exec rake generate:session_secret`>
  MSG_KEY: <use `bundle exec rake newkey:msg`>
  SIGNING_KEY: <production signing key; matching VERIFY_KEY belongs in the API>
  REDISCLOUD_URL: <set by Redis Cloud add-on>
  # REDIS_URL: <set by Heroku Redis add-on>
  GOOGLE_CLIENT_ID: <Google OAuth client id for this application>
  GOOGLE_CLIENT_SECRET: <Google OAuth client secret for this application>
  GOOGLE_AUTH_URL: https://accounts.google.com/o/oauth2/v2/auth
  GOOGLE_TOKEN_URL: https://oauth2.googleapis.com/token
  GOOGLE_JWKS_URL: https://www.googleapis.com/oauth2/v3/certs
