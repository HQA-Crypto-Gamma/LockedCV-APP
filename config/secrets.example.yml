---
# Rename file to secrets.yml to get started for development or test

# Redis URL: set ONE of REDISCLOUD_URL or REDIS_URL, depending on which
# add-on you've provisioned. Redis Cloud exposes REDISCLOUD_URL; Heroku Redis
# exposes REDIS_URL. Code reads whichever is non-nil, Redis Cloud first.

development:
  API_URL: http://localhost:9000/api/v1
  APP_URL: http://localhost:9292
  SESSION_SECRET: <use `bundle exec rake generate:session_secret`>
  MSG_KEY: <use `bundle exec rake newkey:msg`>
  REDISCLOUD_URL: redis://localhost:6379/0
  # REDIS_URL: redis://localhost:6379/0

test:
  API_URL: http://localhost:9000/api/v1
  APP_URL: http://localhost:9292
  SESSION_SECRET: <use `bundle exec rake generate:session_secret`>
  MSG_KEY: <use `bundle exec rake newkey:msg`>
  REDISCLOUD_URL: redis://localhost:6379/0
  # REDIS_URL: redis://localhost:6379/0

production:
  API_URL: <set to production API root>
  APP_URL: <set to production app URL>
  SESSION_SECRET: <use `bundle exec rake generate:session_secret`>
  MSG_KEY: <use `bundle exec rake newkey:msg`>
  REDISCLOUD_URL: <set by Redis Cloud add-on>
  # REDIS_URL: <set by Heroku Redis add-on>
